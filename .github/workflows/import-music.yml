name: Import Music from Drive

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to import music files from Drive'
        required: true

jobs:
  import-music:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install gdown
        run: pip install --upgrade gdown

      - name: Download music files from Drive
        run: |
          mkdir -p assets/audio/music
          gdown --fuzzy "https://drive.google.com/file/d/1wqt_0QNFWEbO48r5IcwT4XOLsKLExQpU/view" -O assets/audio/music/music_vargheim.ogg
          gdown --fuzzy "https://drive.google.com/file/d/1zDaH77oAMkbqloWhboUnjFwOfL38gopr/view" -O assets/audio/music/music_menu.ogg
          gdown --fuzzy "https://drive.google.com/file/d/1LvZMBBGnfs8I1rvGWE9oRtmog6OKS1Fh/view" -O assets/audio/music/music_chapter.ogg
          gdown --fuzzy "https://drive.google.com/file/d/1Ljn5CKYSrA36io10QXEN1UCMClBh_FLi/view" -O assets/audio/music/music_boss.ogg
          ls -lh assets/audio/music/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/audio/music/
          git status
          git commit -m "feat: musicas Kevin MacLeod CC0 (menu, batalha, boss, capitulo)" || echo "nada a commitar"
          git push
