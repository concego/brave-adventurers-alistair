name: Import Music from Drive

on:
  workflow_dispatch:

jobs:
  import-music:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install gdown
        run: pip install --upgrade "gdown==6.1.0"

      - name: Download music files from Drive
        run: |
          mkdir -p assets/audio/music
          python3 -c "
import gdown
gdown.download(id='1wqt_0QNFWEbO48r5IcwT4XOLsKLExQpU', output='assets/audio/music/music_vargheim.ogg', quiet=False)
gdown.download(id='1zDaH77oAMkbqloWhboUnjFwOfL38gopr', output='assets/audio/music/music_menu.ogg', quiet=False)
gdown.download(id='1LvZMBBGnfs8I1rvGWE9oRtmog6OKS1Fh', output='assets/audio/music/music_chapter.ogg', quiet=False)
gdown.download(id='1Ljn5CKYSrA36io10QXEN1UCMClBh_FLi', output='assets/audio/music/music_boss.ogg', quiet=False)
"
          ls -lh assets/audio/music/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/audio/music/
          git commit -m "feat: musicas Kevin MacLeod CC0 (vargheim, menu, chapter, boss)" || echo "nada a commitar"
          git push
