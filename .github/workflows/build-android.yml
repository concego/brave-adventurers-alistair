name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/
          cp -r /root/.local/share/godot/export_templates/4.3.stable \
             ~/.local/share/godot/export_templates/4.3.stable 2>/dev/null || true
          # Garantir também em /root (onde o Godot realmente procura)
          mkdir -p /root/.local/share/godot/export_templates/
          ls /root/.local/share/godot/export_templates/ 2>/dev/null || echo "nenhum em /root"
          echo "Templates HOME: $(ls ~/.local/share/godot/export_templates/4.3.stable 2>/dev/null | grep android | tr '\n' ' ')"

      - name: Setup Android SDK
        run: |
          SDK_ROOT="/usr/local/lib/android/sdk"
          if [ ! -d "$SDK_ROOT" ]; then
            SDK_ROOT="/root/android-sdk"
            wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -O /tmp/cmdtools.zip
            mkdir -p "$SDK_ROOT/cmdline-tools"
            unzip -q /tmp/cmdtools.zip -d /tmp/ct
            mv /tmp/ct/cmdline-tools "$SDK_ROOT/cmdline-tools/latest"
            export PATH="$PATH:$SDK_ROOT/cmdline-tools/latest/bin"
          fi
          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> $GITHUB_ENV
          export ANDROID_SDK_ROOT="$SDK_ROOT"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34" "ndk;23.2.8568313" 2>&1 | tail -3
          echo "SDK: $SDK_ROOT"

      - name: Gerar debug.keystore
        run: |
          mkdir -p /root/.android
          keytool -genkeypair \
            -keystore /root/.android/debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" 2>&1 | tail -2
          echo "KEYSTORE_PATH=/root/.android/debug.keystore" >> $GITHUB_ENV

      - name: Configurar editor_settings em /root
        run: |
          # O Godot no container procura em /root/.config/godot/ (usuário root)
          mkdir -p /root/.config/godot
          # Verificar se já existe algum arquivo de settings
          SETTINGS=$(ls /root/.config/godot/editor_settings-*.tres 2>/dev/null | head -1)
          if [ -z "$SETTINGS" ]; then
            SETTINGS="/root/.config/godot/editor_settings-4.tres"
            printf '[gd_resource type="EditorSettings" format=3]\n\n[resource]\n' > "$SETTINGS"
          fi
          # Remover e re-adicionar as linhas do Android
          sed -i '/export\/android\//d' "$SETTINGS"
          printf 'export/android/android_sdk_path = "%s"\n' "$ANDROID_SDK_ROOT" >> "$SETTINGS"
          printf 'export/android/debug_keystore = "/root/.android/debug.keystore"\n' >> "$SETTINGS"
          printf 'export/android/debug_keystore_user = "androiddebugkey"\n' >> "$SETTINGS"
          printf 'export/android/debug_keystore_pass = "android"\n' >> "$SETTINGS"
          echo "=== $SETTINGS ==="
          cat "$SETTINGS"

      - name: Injetar keystore no export_presets.cfg
        working-directory: ${{ github.workspace }}
        run: |
          if ! grep -q "keystore/debug" export_presets.cfg; then
            printf '\nkeystore/debug="%s"\nkeystore/debug_user="androiddebugkey"\nkeystore/debug_password="android"\n' \
              "$KEYSTORE_PATH" >> export_presets.cfg
          else
            sed -i "s|keystore/debug=\".*\"|keystore/debug=\"$KEYSTORE_PATH\"|g" export_presets.cfg
          fi
          echo "=== keystore no preset ==="
          grep -i keystore export_presets.cfg

      - name: Export APK debug
        working-directory: ${{ github.workspace }}
        env:
          GODOT_ANDROID_KEYSTORE_DEBUG_PATH: /root/.android/debug.keystore
          GODOT_ANDROID_KEYSTORE_DEBUG_USER: androiddebugkey
          GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD: android
        run: |
          mkdir -p build
          APK_OUT="$GITHUB_WORKSPACE/build/brave-adventurers-alistair-debug.apk"

          echo "::warning::HOME=$HOME | SDK=$ANDROID_SDK_ROOT | KS=$KEYSTORE_PATH"
          echo "::warning::editor_settings: $(ls /root/.config/godot/ 2>/dev/null | tr '\n' ' ')"
          echo "::warning::templates: $(ls /root/.local/share/godot/export_templates/4.3.stable/ 2>/dev/null | grep android | tr '\n' ' ')"

          godot --headless --verbose \
            --audio-driver Dummy \
            --path "$GITHUB_WORKSPACE" \
            --export-debug "Android" \
            "$APK_OUT" 2>&1 | while IFS= read -r line; do echo "::warning::$line"; done || true

          if [ -f "$APK_OUT" ]; then
            echo "::notice::✅ APK GERADO: $(ls -sh $APK_OUT | awk '{print $1}')"
          else
            echo "::error::❌ APK NAO GERADO"
            ls -la build/ || true
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: brave-adventurers-alistair-debug
          path: ${{ github.workspace }}/build/brave-adventurers-alistair-debug.apk
          if-no-files-found: error
          retention-days: 14
