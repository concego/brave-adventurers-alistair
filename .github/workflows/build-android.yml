name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: 4.3
  EXPORT_NAME: brave-adventurers-alistair

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: |
          sdkmanager "build-tools;34.0.0" "platforms;android-34" "ndk;23.2.8568313"
          echo "SDK: $ANDROID_SDK_ROOT"
          ls "$ANDROID_SDK_ROOT/build-tools/"

      - name: Gerar debug.keystore
        run: |
          mkdir -p "$HOME/.android"
          keytool -genkeypair \
            -keystore "$HOME/.android/debug.keystore" \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" 2>&1 | tail -2

      - name: Download Godot + templates
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/$GODOT_VERSION-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q "Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          chmod +x "Godot_v${GODOT_VERSION}-stable_linux.x86_64"
          sudo mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot
          rm -f "Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"

          TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$TEMPLATES_DIR"
          wget -q "https://github.com/godotengine/godot/releases/download/$GODOT_VERSION-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -q "Godot_v${GODOT_VERSION}-stable_export_templates.tpz" -d /tmp/tpl
          mv /tmp/tpl/templates/* "$TEMPLATES_DIR/"
          rm -f "Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          echo "Templates: $(ls $TEMPLATES_DIR | grep android | tr '\n' ' ')"

      - name: Configurar editor settings (append)
        run: |
          mkdir -p "$HOME/.config/godot"
          touch "$HOME/.config/godot/editor_settings-4.tres"
          # Remover linhas android existentes e re-adicionar
          grep -v "export/android" "$HOME/.config/godot/editor_settings-4.tres" > /tmp/settings_clean.txt || true
          cat /tmp/settings_clean.txt > "$HOME/.config/godot/editor_settings-4.tres"
          # Garantir header
          grep -q "gd_resource" "$HOME/.config/godot/editor_settings-4.tres" || \
            printf '[gd_resource type="EditorSettings" format=3]\n\n[resource]\n' > "$HOME/.config/godot/editor_settings-4.tres"
          # Adicionar configurações android
          cat >> "$HOME/.config/godot/editor_settings-4.tres" << 'SETTINGS'
export/android/android_sdk_path = "/usr/local/lib/android/sdk"
export/android/shutdown_adb_on_exit = true
export/android/debug_keystore = "/home/runner/.android/debug.keystore"
export/android/debug_keystore_user = "androiddebugkey"
export/android/debug_keystore_pass = "android"
SETTINGS
          cat "$HOME/.config/godot/editor_settings-4.tres"

      - name: Instalar android build template no projeto
        working-directory: ${{ github.workspace }}
        run: |
          TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p android/plugins android/build
          touch android/build/.gdignore
          echo "${GODOT_VERSION}.stable" > android/.build_version
          unzip -q "$TEMPLATES_DIR/android_source.zip" -d android/build
          echo "android/build: $(ls android/build | head -5 | tr '\n' ' ')"

      - name: Injetar keystore no export_presets.cfg
        working-directory: ${{ github.workspace }}
        run: |
          KS="$HOME/.android/debug.keystore"
          if ! grep -q "keystore/debug" export_presets.cfg; then
            printf '\nkeystore/debug="%s"\nkeystore/debug_user="androiddebugkey"\nkeystore/debug_password="android"\n' "$KS" \
              >> export_presets.cfg
          else
            sed -i "s|keystore/debug=\".*\"|keystore/debug=\"$KS\"|g" export_presets.cfg
          fi
          # Habilitar gradle_build já que agora temos android/build/
          sed -i 's/gradle_build\/use_gradle_build=false/gradle_build\/use_gradle_build=false/' export_presets.cfg
          grep -i "keystore\|gradle" export_presets.cfg

      - name: Import assets (editor mode com timeout)
        working-directory: ${{ github.workspace }}
        run: |
          timeout 30 godot --headless --path "$GITHUB_WORKSPACE" -e 2>&1 | \
            while IFS= read -r l; do echo "::warning::IMP| $l"; done || true
          echo "::notice::import: $(find $GITHUB_WORKSPACE/.godot/ -type f 2>/dev/null | wc -l) arquivos"

      - name: Export APK release
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p build
          APK_OUT="$GITHUB_WORKSPACE/build/${EXPORT_NAME}-debug.apk"

          godot --headless --verbose --audio-driver Dummy \
            --path "$GITHUB_WORKSPACE" \
            --export-debug "Android" "$APK_OUT" 2>&1 | \
            while IFS= read -r l; do echo "::warning::EXP| $l"; done || true

          if [ -f "$APK_OUT" ]; then
            echo "::notice::✅ APK GERADO: $(ls -sh $APK_OUT | awk '{print $1}')"
          else
            echo "::error::❌ APK NAO GERADO"
            ls -la build/ || true
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-debug
          path: ${{ github.workspace }}/build/${{ env.EXPORT_NAME }}-debug.apk
          if-no-files-found: error
          retention-days: 14
