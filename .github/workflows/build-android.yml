name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android SDK components
        run: |
          export ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34" "ndk;23.2.8568313"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      - name: Install Godot 4.3
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          chmod +x Godot_v4.3-stable_linux.x86_64
          sudo mv Godot_v4.3-stable_linux.x86_64 /usr/local/bin/godot
          echo "Godot: $(godot --version)"

      - name: Install Android export templates
        run: |
          TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/4.3.stable"
          mkdir -p "$TEMPLATES_DIR"
          wget -q "https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz" -O templates.tpz
          unzip -q templates.tpz -d /tmp/tpl
          mv /tmp/tpl/templates/* "$TEMPLATES_DIR/"
          ls "$TEMPLATES_DIR/" | grep android

      - name: Install Android build template no projeto
        run: |
          TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/4.3.stable"
          mkdir -p android/build
          unzip -q "$TEMPLATES_DIR/android_source.zip" -d android/build
          echo "4.3.stable" > android/.build_version
          echo "android/build pronto: $(ls android/build | wc -l) itens"

      - name: Gerar debug.keystore
        run: |
          mkdir -p "$HOME/.android"
          keytool -genkeypair -v \
            -keystore "$HOME/.android/debug.keystore" \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" 2>&1 | tail -2

      - name: Configurar Godot editor settings
        run: |
          mkdir -p "$HOME/.config/godot"
          cat > "$HOME/.config/godot/editor_settings-4.tres" << EOF
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/android_sdk_path = "$ANDROID_SDK_ROOT"
          export/android/debug_keystore = "$HOME/.android/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      - name: Pre-heat — importar assets
        run: |
          godot --headless --editor --quit 2>&1 || true
          echo "Cache: $(ls .godot/ 2>/dev/null | wc -l) itens"

      - name: Export APK debug (capturando log inline)
        run: |
          mkdir -p build
          echo "====== GODOT EXPORT LOG ======"
          godot --headless --verbose \
            --export-debug "Android" \
            "build/brave-adventurers-alistair-debug.apk" 2>&1 || true
          echo "====== FIM DO LOG ======"
          echo ""
          echo "=== Resultado ==="
          if [ -f "build/brave-adventurers-alistair-debug.apk" ]; then
            ls -lh build/brave-adventurers-alistair-debug.apk
            echo "APK GERADO COM SUCESSO"
          else
            echo "APK NAO ENCONTRADO"
            ls -lah build/ 2>/dev/null || echo "(build/ vazia)"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: brave-adventurers-alistair-debug
          path: build/brave-adventurers-alistair-debug.apk
          if-no-files-found: error
          retention-days: 14
