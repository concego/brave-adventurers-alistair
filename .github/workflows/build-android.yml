name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/4.3.stable \
             ~/.local/share/godot/export_templates/4.3.stable
          mkdir -p ~/.config/
          mv /root/.config/godot ~/.config/godot || true
          # Fix: adicionar java_sdk_path ao editor_settings (required em 4.3)
          echo 'export/android/java_sdk_path = "/usr/lib/jvm/java-17-openjdk-amd64"' \
            >> ~/.config/godot/editor_settings-4.3.tres || true
          echo "Templates: $(ls ~/.local/share/godot/export_templates/4.3.stable | grep android | tr '\n' ' ')"

      - name: Setup Android SDK
        run: |
          SDK_ROOT="/usr/local/lib/android/sdk"
          if [ ! -d "$SDK_ROOT" ]; then
            SDK_ROOT="$HOME/android-sdk"
            wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -O /tmp/cmdtools.zip
            mkdir -p "$SDK_ROOT/cmdline-tools"
            unzip -q /tmp/cmdtools.zip -d /tmp/ct
            mv /tmp/ct/cmdline-tools "$SDK_ROOT/cmdline-tools/latest"
            export PATH="$PATH:$SDK_ROOT/cmdline-tools/latest/bin"
          fi
          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> $GITHUB_ENV
          export ANDROID_SDK_ROOT="$SDK_ROOT"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34" "ndk;23.2.8568313" 2>&1 | tail -3
          echo "SDK: $SDK_ROOT — $(ls $SDK_ROOT | tr '\n' ' ')"

      - name: Gerar debug.keystore
        run: |
          mkdir -p "$HOME/.android"
          keytool -genkeypair \
            -keystore "$HOME/.android/debug.keystore" \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" 2>&1 | tail -2
          echo "KEYSTORE_PATH=$HOME/.android/debug.keystore" >> $GITHUB_ENV

      - name: Configurar editor_settings com SDK
        run: |
          python3 -c "
          import os, glob
          home = os.environ.get('HOME', '/root')
          sdk  = os.environ.get('ANDROID_SDK_ROOT', '')
          ks   = home + '/.android/debug.keystore'
          # Encontrar o arquivo editor_settings correto
          candidates = glob.glob(home + '/.config/godot/editor_settings-*.tres')
          path = candidates[0] if candidates else home + '/.config/godot/editor_settings-4.tres'
          print('Usando settings:', path)
          try:
            content = open(path).read()
          except:
            content = '[gd_resource type=\"EditorSettings\" format=3]\n\n[resource]\n'
          # Atualizar ou adicionar linhas
          lines_to_add = {
            'export/android/android_sdk_path': '\"' + sdk + '\"',
            'export/android/debug_keystore': '\"' + ks + '\"',
            'export/android/debug_keystore_user': '\"androiddebugkey\"',
            'export/android/debug_keystore_pass': '\"android\"',
          }
          for key, val in lines_to_add.items():
            new_line = key + ' = ' + val
            if key in content:
              import re
              content = re.sub(key + r' = .*', new_line, content)
            else:
              content += new_line + '\n'
          open(path, 'w').write(content)
          print(content)
          "

      - name: Injetar keystore no export_presets.cfg
        working-directory: ${{ github.workspace }}
        run: |
          # Godot 4.3: keystore lines DEVEM existir no preset para export funcionar
          # Adicionar se não existirem
          if ! grep -q "keystore/debug" export_presets.cfg; then
            python3 -c "
          import os
          ks = os.environ.get('KEYSTORE_PATH', '')
          lines = '\nkeystore/debug=\"' + ks + '\"\nkeystore/debug_user=\"androiddebugkey\"\nkeystore/debug_password=\"android\"\n'
          content = open('export_presets.cfg').read().rstrip()
          open('export_presets.cfg', 'w').write(content + lines)
          "
          else
            sed -i "s|keystore/debug=\".*\"|keystore/debug=\"$KEYSTORE_PATH\"|g" export_presets.cfg
          fi
          echo "=== preset keystore ==="
          grep -i keystore export_presets.cfg

      - name: Export APK debug
        working-directory: ${{ github.workspace }}
        env:
          GODOT_ANDROID_KEYSTORE_DEBUG_PATH: ${{ env.KEYSTORE_PATH }}
          GODOT_ANDROID_KEYSTORE_DEBUG_USER: androiddebugkey
          GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD: android
        run: |
          mkdir -p build
          APK_OUT="$GITHUB_WORKSPACE/build/brave-adventurers-alistair-debug.apk"

          echo "::warning::SDK=$ANDROID_SDK_ROOT"
          echo "::warning::KS=$KEYSTORE_PATH"

          godot --headless --verbose \
            --audio-driver Dummy \
            --path "$GITHUB_WORKSPACE" \
            --export-debug "Android" \
            "$APK_OUT" 2>&1 | while IFS= read -r line; do echo "::warning::$line"; done || true

          if [ -f "$APK_OUT" ]; then
            echo "::notice::✅ APK GERADO: $(ls -sh $APK_OUT | awk '{print $1}')"
          else
            echo "::error::❌ APK NAO GERADO"
            ls -la build/ || true
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: brave-adventurers-alistair-debug
          path: ${{ github.workspace }}/build/brave-adventurers-alistair-debug.apk
          if-no-files-found: error
          retention-days: 14
