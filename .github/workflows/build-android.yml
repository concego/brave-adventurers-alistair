name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android SDK components
        run: |
          export ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34" "ndk;23.2.8568313"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/23.2.8568313" >> $GITHUB_ENV

      - name: Install Godot 4.3
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          chmod +x Godot_v4.3-stable_linux.x86_64
          sudo mv Godot_v4.3-stable_linux.x86_64 /usr/local/bin/godot
          echo "Godot: $(godot --version)"

      - name: Install Android export templates
        run: |
          TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/4.3.stable"
          mkdir -p "$TEMPLATES_DIR"
          wget -q "https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz" -O templates.tpz
          unzip -q templates.tpz -d /tmp/templates_extracted
          mv /tmp/templates_extracted/templates/* "$TEMPLATES_DIR/"
          echo "Templates Android disponíveis:"
          ls "$TEMPLATES_DIR/" | grep android || echo "(nenhum android encontrado)"

      - name: Configure Godot editor settings
        run: |
          EDITOR_DIR="$HOME/.config/godot"
          mkdir -p "$EDITOR_DIR"
          cat > "$EDITOR_DIR/editor_settings-4.tres" << EOF
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/android_sdk_path = "$ANDROID_SDK_ROOT"
          EOF

      - name: Pre-heat — importar assets do projeto
        run: |
          echo "Gerando cache .godot/ ..."
          godot --headless --editor --quit 2>&1 || true
          echo "Conteudo .godot/:"
          ls .godot/ 2>/dev/null || echo "(vazia)"

      - name: Export APK debug
        run: |
          mkdir -p build
          echo "=== export_presets.cfg ==="
          cat export_presets.cfg
          echo ""
          echo "=== Iniciando export ==="
          godot --headless --verbose --export-debug "Android" "build/brave-adventurers-alistair-debug.apk" 2>&1
          echo "Exit code: $?"
          echo "=== Conteudo build/ ==="
          ls -lh build/ 2>/dev/null || echo "(build/ vazia)"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: brave-adventurers-alistair-debug
          path: build/brave-adventurers-alistair-debug.apk
          retention-days: 14

      - name: Upload build logs (em caso de falha)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-debug
          path: |
            build/
            .godot/
          retention-days: 3
          if-no-files-found: ignore
