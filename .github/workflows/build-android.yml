name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        run: |
          SDK_ROOT="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
          if [ ! -d "$SDK_ROOT" ]; then
            SDK_ROOT="$HOME/android-sdk"
            wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -O /tmp/cmdtools.zip
            mkdir -p "$SDK_ROOT/cmdline-tools"
            unzip -q /tmp/cmdtools.zip -d /tmp/ct
            mv /tmp/ct/cmdline-tools "$SDK_ROOT/cmdline-tools/latest"
            export PATH="$PATH:$SDK_ROOT/cmdline-tools/latest/bin"
          fi
          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> $GITHUB_ENV
          export ANDROID_SDK_ROOT="$SDK_ROOT"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34" "ndk;23.2.8568313" 2>&1 | tail -3
          echo "SDK: $SDK_ROOT"

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libasound2 libpulse0 libgl1-mesa-dri libgles2-mesa \
            libx11-6 libxcursor1 libxinerama1 libxrandr2 libxrender1 libxi6 \
            libdbus-1-3 xvfb 2>/dev/null || true

      - name: Gerar debug.keystore
        run: |
          mkdir -p "$HOME/.android"
          keytool -genkeypair \
            -keystore "$HOME/.android/debug.keystore" \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" 2>&1 | tail -2
          echo "KEYSTORE_PATH=$HOME/.android/debug.keystore" >> $GITHUB_ENV

      - name: Configurar Godot editor settings
        run: |
          mkdir -p "$HOME/.config/godot"
          python3 -c "
          import os
          sdk  = os.environ.get('ANDROID_SDK_ROOT', '')
          home = os.environ.get('HOME', '')
          ks   = home + '/.android/debug.keystore'
          content = '[gd_resource type=\"EditorSettings\" format=3]\n\n[resource]\n'
          content += 'export/android/android_sdk_path = \"' + sdk + '\"\n'
          content += 'export/android/debug_keystore = \"' + ks + '\"\n'
          content += 'export/android/debug_keystore_user = \"androiddebugkey\"\n'
          content += 'export/android/debug_keystore_pass = \"android\"\n'
          path = home + '/.config/godot/editor_settings-4.tres'
          open(path, 'w').write(content)
          print('editor_settings escrito:', path)
          print(content)
          "

      - name: Install Godot 4.3 + templates
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip" -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot_bin
          chmod +x "/tmp/godot_bin/Godot_v4.3-stable_linux.x86_64"
          sudo cp "/tmp/godot_bin/Godot_v4.3-stable_linux.x86_64" /usr/local/bin/godot
          TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/4.3.stable"
          mkdir -p "$TEMPLATES_DIR"
          wget -q "https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz" -O /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/tpl
          mv /tmp/tpl/templates/* "$TEMPLATES_DIR/"
          echo "Templates: $(ls $TEMPLATES_DIR | grep android | tr '\n' ' ')"

      - name: Importar assets do projeto
        working-directory: ${{ github.workspace }}
        run: |
          xvfb-run --auto-servernum godot --headless \
            --audio-driver Dummy \
            --path "$GITHUB_WORKSPACE" \
            --import 2>&1 | while IFS= read -r l; do echo "::warning::IMP| $l"; done || true
          echo "::notice::import: $(find $GITHUB_WORKSPACE/.godot/ -type f 2>/dev/null | wc -l) arquivos"

      - name: Export APK debug
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p "$GITHUB_WORKSPACE/build"
          APK_OUT="$GITHUB_WORKSPACE/build/brave-adventurers-alistair-debug.apk"

          echo "::warning::SDK=$ANDROID_SDK_ROOT | JAVA=$JAVA_HOME"
          ls "$ANDROID_SDK_ROOT/build-tools/" 2>/dev/null | head -3 | while IFS= read -r l; do echo "::warning::BT| $l"; done
          ls "$ANDROID_SDK_ROOT/ndk/" 2>/dev/null | head -3 | while IFS= read -r l; do echo "::warning::NDK| $l"; done

          xvfb-run --auto-servernum godot --headless --verbose \
            --audio-driver Dummy \
            --path "$GITHUB_WORKSPACE" \
            --export-debug "Android" \
            "$APK_OUT" 2>&1 | while IFS= read -r line; do echo "::warning::EXP| $line"; done || true

          if [ -f "$APK_OUT" ]; then
            echo "::notice::✅ APK GERADO: $(ls -sh $APK_OUT | awk '{print $1}')"
          else
            echo "::error::❌ APK NAO GERADO"
            ls -la "$GITHUB_WORKSPACE/build/" || true
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: brave-adventurers-alistair-debug
          path: ${{ github.workspace }}/build/brave-adventurers-alistair-debug.apk
          if-no-files-found: error
          retention-days: 14
