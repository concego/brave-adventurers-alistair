name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools + NDK
        run: |
          sdkmanager "build-tools;34.0.0" "platforms;android-34" "ndk;23.2.8568313"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      - name: Gerar debug.keystore
        run: |
          mkdir -p "$HOME/.android"
          keytool -genkeypair \
            -keystore "$HOME/.android/debug.keystore" \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" 2>&1 | tail -2
          echo "Keystore: $(ls -lh $HOME/.android/debug.keystore)"

      - name: Configurar Godot editor settings (Android + keystore)
        run: |
          mkdir -p "$HOME/.config/godot"
          cat > "$HOME/.config/godot/editor_settings-4.tres" << EOF
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/android_sdk_path = "$ANDROID_SDK_ROOT"
          export/android/debug_keystore = "$HOME/.android/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      - name: Instalar Android build template no projeto
        run: |
          # Baixar os templates primeiro para extrair o android_source.zip
          TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/4.3.stable"
          mkdir -p "$TEMPLATES_DIR"
          wget -q "https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz" -O /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/tpl
          mv /tmp/tpl/templates/* "$TEMPLATES_DIR/"
          # Instalar source template na pasta android/ do projeto
          mkdir -p android/build
          unzip -q "$TEMPLATES_DIR/android_source.zip" -d android/build
          echo "4.3.stable" > android/.build_version
          echo "android/build: $(ls android/build | wc -l) itens"

      - name: Export APK (firebelley/godot-export)
        uses: firebelley/godot-export@v8.0.0
        with:
          godot_executable_download_url: "https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip"
          godot_export_templates_download_url: "https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz"
          relative_project_path: "./"
          export_debug: true
          cache: true
          presets_to_export: "Android"
          verbose: true

      - name: Upload APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: brave-adventurers-alistair-debug
          path: "/home/runner/work/brave-adventurers-alistair/brave-adventurers-alistair/build/brave-adventurers-alistair-debug.apk"
          if-no-files-found: warn
          retention-days: 14

      - name: Upload build directory completo (fallback)
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: ${{ steps.export.outputs.build_directory }}
          if-no-files-found: ignore
          retention-days: 14
