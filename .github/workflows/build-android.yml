name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android SDK
        run: |
          SDK_ROOT="/root/android-sdk"
          mkdir -p "$SDK_ROOT/cmdline-tools/latest"
          wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -O /tmp/cmdtools.zip
          unzip -q /tmp/cmdtools.zip -d /tmp/ct
          cp -r /tmp/ct/cmdline-tools/. "$SDK_ROOT/cmdline-tools/latest/"
          SDKMGR="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMGR" --sdk_root="$SDK_ROOT" --licenses > /dev/null 2>&1 || true
          "$SDKMGR" --sdk_root="$SDK_ROOT" "build-tools;34.0.0" "platforms;android-34" "ndk;23.2.8568313" 2>&1 | tail -3
          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> $GITHUB_ENV
          echo "BT: $(ls $SDK_ROOT/build-tools/)"
          echo "NDK: $(ls $SDK_ROOT/ndk/)"

      - name: Gerar debug.keystore
        run: |
          mkdir -p /root/.android
          keytool -genkeypair \
            -keystore /root/.android/debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" 2>&1 | tail -2
          echo "KEYSTORE_PATH=/root/.android/debug.keystore" >> $GITHUB_ENV

      - name: Configurar editor_settings (em /root E em HOME)
        run: |
          write_settings() {
            local dir="$1"
            mkdir -p "$dir"
            # Usar os dois nomes possíveis do arquivo
            for fname in "editor_settings-4.tres" "editor_settings-4.3.tres"; do
              local f="$dir/$fname"
              if [ -f "$f" ]; then
                sed -i '/export\/android\//d' "$f"
              else
                printf '[gd_resource type="EditorSettings" format=3]\n\n[resource]\n' > "$f"
              fi
              printf 'export/android/android_sdk_path = "/root/android-sdk"\n' >> "$f"
              printf 'export/android/debug_keystore = "/root/.android/debug.keystore"\n' >> "$f"
              printf 'export/android/debug_keystore_user = "androiddebugkey"\n' >> "$f"
              printf 'export/android/debug_keystore_pass = "android"\n' >> "$f"
              echo "::warning::Escrito: $f"
            done
          }
          write_settings /root/.config/godot
          # Também escrever em $HOME se diferente de /root
          if [ "$HOME" != "/root" ]; then
            write_settings "$HOME/.config/godot"
          fi

      - name: Injetar keystore no export_presets.cfg
        working-directory: ${{ github.workspace }}
        run: |
          if ! grep -q "keystore/debug" export_presets.cfg; then
            printf '\nkeystore/debug="/root/.android/debug.keystore"\nkeystore/debug_user="androiddebugkey"\nkeystore/debug_password="android"\n' \
              >> export_presets.cfg
          else
            sed -i 's|keystore/debug=".*"|keystore/debug="/root/.android/debug.keystore"|g' export_presets.cfg
          fi

      - name: Import assets
        working-directory: ${{ github.workspace }}
        run: |
          godot --headless --audio-driver Dummy \
            --path "$GITHUB_WORKSPACE" --import 2>&1 | \
            while IFS= read -r l; do echo "::warning::IMP| $l"; done || true
          echo "::notice::import: $(find $GITHUB_WORKSPACE/.godot/ -type f 2>/dev/null | wc -l) arquivos"

      - name: Export APK debug
        working-directory: ${{ github.workspace }}
        env:
          GODOT_ANDROID_KEYSTORE_DEBUG_PATH: /root/.android/debug.keystore
          GODOT_ANDROID_KEYSTORE_DEBUG_USER: androiddebugkey
          GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD: android
        run: |
          mkdir -p build
          APK_OUT="$GITHUB_WORKSPACE/build/brave-adventurers-alistair-debug.apk"

          echo "::warning::HOME=$HOME | settings: $(ls /root/.config/godot/ | tr '\n' ' ')"
          echo "::warning::settings HOME: $(ls $HOME/.config/godot/ 2>/dev/null | tr '\n' ' ')"

          godot --headless --verbose --audio-driver Dummy \
            --path "$GITHUB_WORKSPACE" \
            --export-debug "Android" "$APK_OUT" 2>&1 | \
            while IFS= read -r l; do echo "::warning::EXP| $l"; done || true

          if [ -f "$APK_OUT" ]; then
            echo "::notice::✅ APK GERADO: $(ls -sh $APK_OUT | awk '{print $1}')"
          else
            echo "::error::❌ APK NAO GERADO"
            ls -la build/ || true
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: brave-adventurers-alistair-debug
          path: ${{ github.workspace }}/build/brave-adventurers-alistair-debug.apk
          if-no-files-found: error
          retention-days: 14
