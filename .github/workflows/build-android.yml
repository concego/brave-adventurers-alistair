name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK (manual, sem action externa)
        run: |
          # Usar o SDK já pré-instalado no runner ubuntu-latest
          # O runner tem ANDROID_SDK_ROOT definido por padrão
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-$HOME/android-sdk}" >> $GITHUB_ENV
          SDK_ROOT="${ANDROID_SDK_ROOT:-$HOME/android-sdk}"
          echo "SDK em: $SDK_ROOT"
          ls "$SDK_ROOT" 2>/dev/null || echo "(SDK root não encontrado, usando cmdline-tools)"

          # Instalar ferramentas necessárias via sdkmanager já disponível
          if command -v sdkmanager &>/dev/null; then
            yes | sdkmanager --licenses > /dev/null 2>&1 || true
            sdkmanager "build-tools;34.0.0" "platforms;android-34" "ndk;23.2.8568313" 2>&1 | tail -5
          else
            # Baixar cmdline-tools se não disponível
            wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -O /tmp/cmdtools.zip
            mkdir -p "$HOME/android-sdk/cmdline-tools"
            unzip -q /tmp/cmdtools.zip -d /tmp/cmdtools_tmp
            mv /tmp/cmdtools_tmp/cmdline-tools "$HOME/android-sdk/cmdline-tools/latest"
            export PATH="$PATH:$HOME/android-sdk/cmdline-tools/latest/bin"
            export ANDROID_SDK_ROOT="$HOME/android-sdk"
            echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
            yes | sdkmanager --licenses > /dev/null 2>&1 || true
            sdkmanager "build-tools;34.0.0" "platforms;android-34" "ndk;23.2.8568313" 2>&1 | tail -5
          fi

          echo "SDK_ROOT final: ${ANDROID_SDK_ROOT}"

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libasound2 libpulse0 \
            libgl1-mesa-dri libgles2-mesa \
            libx11-6 libxcursor1 libxinerama1 libxrandr2 libxrender1 libxi6 \
            libdbus-1-3 xvfb \
            2>/dev/null || true

      - name: Gerar debug.keystore
        run: |
          mkdir -p "$HOME/.android"
          keytool -genkeypair \
            -keystore "$HOME/.android/debug.keystore" \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" 2>&1 | tail -2
          echo "KEYSTORE_PATH=$HOME/.android/debug.keystore" >> $GITHUB_ENV

      - name: Configurar Godot editor settings
        run: |
          mkdir -p "$HOME/.config/godot"
          SDK="${ANDROID_SDK_ROOT}"
          KS="$HOME/.android/debug.keystore"
          printf '[gd_resource type="EditorSettings" format=3]\n[resource]\nexport/android/android_sdk_path = "%s"\nexport/android/debug_keystore = "%s"\nexport/android/debug_keystore_user = "androiddebugkey"\nexport/android/debug_keystore_pass = "android"\n' \
            "$SDK" "$KS" > "$HOME/.config/godot/editor_settings-4.tres"
          cat "$HOME/.config/godot/editor_settings-4.tres"

      - name: Injetar keystore no export_presets.cfg
        working-directory: ${{ github.workspace }}
        run: |
          if grep -q "keystore/debug" export_presets.cfg; then
            sed -i "s|keystore/debug=\".*\"|keystore/debug=\"$KEYSTORE_PATH\"|g" export_presets.cfg
          else
            printf '\nkeystore/debug="%s"\nkeystore/debug_user="androiddebugkey"\nkeystore/debug_password="android"\n' \
              "$KEYSTORE_PATH" >> export_presets.cfg
          fi
          grep -i keystore export_presets.cfg

      - name: Install Godot 4.3 + templates
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip" -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot_bin
          chmod +x "/tmp/godot_bin/Godot_v4.3-stable_linux.x86_64"
          sudo cp "/tmp/godot_bin/Godot_v4.3-stable_linux.x86_64" /usr/local/bin/godot
          TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/4.3.stable"
          mkdir -p "$TEMPLATES_DIR"
          wget -q "https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz" -O /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/tpl
          mv /tmp/tpl/templates/* "$TEMPLATES_DIR/"
          echo "Templates android: $(ls $TEMPLATES_DIR | grep android | tr '\n' ' ')"

      - name: Diagnostico completo (tudo via annotations)
        working-directory: ${{ github.workspace }}
        run: |
          ann() { while IFS= read -r line; do echo "::warning::DIAG| $line"; done; }

          echo "::warning::=== 1. GODOT VERSION ==="
          xvfb-run --auto-servernum godot --version 2>&1 | ann

          echo "::warning::=== 2. GODOT --quit (projeto carrega?) ==="
          xvfb-run --auto-servernum godot --headless \
            --path "$GITHUB_WORKSPACE" --quit 2>&1 | ann || true

          echo "::warning::=== 3. IMPORT ==="
          xvfb-run --auto-servernum godot --headless \
            --path "$GITHUB_WORKSPACE" --import 2>&1 | ann || true

          find "$GITHUB_WORKSPACE/.godot/" -type f 2>/dev/null | wc -l | \
            xargs -I{} echo "::warning::DIAG| arquivos pos-import: {}"

          echo "::warning::=== 4. export_presets.cfg ==="
          cat export_presets.cfg | ann

          echo "::warning::=== 5. editor_settings ==="
          cat "$HOME/.config/godot/editor_settings-4.tres" | ann

      - name: Export APK debug
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p "$GITHUB_WORKSPACE/build"
          APK_OUT="$GITHUB_WORKSPACE/build/brave-adventurers-alistair-debug.apk"

          xvfb-run --auto-servernum godot --headless --verbose \
            --path "$GITHUB_WORKSPACE" \
            --export-debug "Android" \
            "$APK_OUT" 2>&1 | while IFS= read -r line; do echo "::warning::$line"; done || true

          if [ -f "$APK_OUT" ]; then
            echo "::notice::✅ APK GERADO: $(ls -sh $APK_OUT | awk '{print $1}')"
          else
            echo "::error::❌ APK NAO GERADO"
            ls -la "$GITHUB_WORKSPACE/build/" || true
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: brave-adventurers-alistair-debug
          path: ${{ github.workspace }}/build/brave-adventurers-alistair-debug.apk
          if-no-files-found: error
          retention-days: 14
