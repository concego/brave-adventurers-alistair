name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/4.3.stable \
             ~/.local/share/godot/export_templates/4.3.stable 2>/dev/null || \
          cp -r /root/.local/share/godot/export_templates/4.3.stable \
             ~/.local/share/godot/export_templates/4.3.stable 2>/dev/null || true
          mkdir -p ~/.config/
          cp -r /root/.config/godot ~/.config/godot 2>/dev/null || true
          echo "Templates: $(ls ~/.local/share/godot/export_templates/4.3.stable | grep android | tr '\n' ' ')"

      - name: Setup Android SDK
        run: |
          SDK_ROOT="/usr/local/lib/android/sdk"
          if [ ! -d "$SDK_ROOT" ]; then
            SDK_ROOT="$HOME/android-sdk"
            wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -O /tmp/cmdtools.zip
            mkdir -p "$SDK_ROOT/cmdline-tools"
            unzip -q /tmp/cmdtools.zip -d /tmp/ct
            mv /tmp/ct/cmdline-tools "$SDK_ROOT/cmdline-tools/latest"
            export PATH="$PATH:$SDK_ROOT/cmdline-tools/latest/bin"
          fi
          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> $GITHUB_ENV
          export ANDROID_SDK_ROOT="$SDK_ROOT"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34" "ndk;23.2.8568313" 2>&1 | tail -3
          echo "SDK: $SDK_ROOT"

      - name: Gerar debug.keystore
        run: |
          apt-get install -y -qq default-jdk-headless 2>/dev/null || true
          mkdir -p "$HOME/.android"
          keytool -genkeypair \
            -keystore "$HOME/.android/debug.keystore" \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" 2>&1 | tail -2
          echo "KEYSTORE_PATH=$HOME/.android/debug.keystore" >> $GITHUB_ENV

      - name: Configurar editor_settings com SDK (shell puro)
        run: |
          SETTINGS_FILE=$(ls ~/.config/godot/editor_settings-*.tres 2>/dev/null | head -1)
          if [ -z "$SETTINGS_FILE" ]; then
            SETTINGS_FILE="$HOME/.config/godot/editor_settings-4.tres"
            mkdir -p "$HOME/.config/godot"
            printf '[gd_resource type="EditorSettings" format=3]\n\n[resource]\n' > "$SETTINGS_FILE"
          fi
          # Remover linhas existentes e re-adicionar
          sed -i '/export\/android\/android_sdk_path/d' "$SETTINGS_FILE"
          sed -i '/export\/android\/debug_keystore/d' "$SETTINGS_FILE"
          sed -i '/export\/android\/java_sdk_path/d' "$SETTINGS_FILE"
          printf 'export/android/android_sdk_path = "%s"\n' "$ANDROID_SDK_ROOT" >> "$SETTINGS_FILE"
          printf 'export/android/debug_keystore = "%s/.android/debug.keystore"\n' "$HOME" >> "$SETTINGS_FILE"
          printf 'export/android/debug_keystore_user = "androiddebugkey"\n' >> "$SETTINGS_FILE"
          printf 'export/android/debug_keystore_pass = "android"\n' >> "$SETTINGS_FILE"
          printf 'export/android/java_sdk_path = "/usr/lib/jvm/java-17-openjdk-amd64"\n' >> "$SETTINGS_FILE"
          echo "=== $SETTINGS_FILE ==="
          cat "$SETTINGS_FILE"

      - name: Injetar keystore no export_presets.cfg
        working-directory: ${{ github.workspace }}
        run: |
          if ! grep -q "keystore/debug" export_presets.cfg; then
            printf '\nkeystore/debug="%s"\nkeystore/debug_user="androiddebugkey"\nkeystore/debug_password="android"\n' \
              "$KEYSTORE_PATH" >> export_presets.cfg
          else
            sed -i "s|keystore/debug=\".*\"|keystore/debug=\"$KEYSTORE_PATH\"|g" export_presets.cfg
          fi
          echo "=== keystore ==="
          grep -i keystore export_presets.cfg

      - name: Export APK debug
        working-directory: ${{ github.workspace }}
        env:
          GODOT_ANDROID_KEYSTORE_DEBUG_PATH: ${{ env.KEYSTORE_PATH }}
          GODOT_ANDROID_KEYSTORE_DEBUG_USER: androiddebugkey
          GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD: android
        run: |
          mkdir -p build
          APK_OUT="$GITHUB_WORKSPACE/build/brave-adventurers-alistair-debug.apk"

          echo "::warning::SDK=$ANDROID_SDK_ROOT | KS=$KEYSTORE_PATH"

          godot --headless --verbose \
            --audio-driver Dummy \
            --path "$GITHUB_WORKSPACE" \
            --export-debug "Android" \
            "$APK_OUT" 2>&1 | while IFS= read -r line; do echo "::warning::$line"; done || true

          if [ -f "$APK_OUT" ]; then
            echo "::notice::✅ APK GERADO: $(ls -sh $APK_OUT | awk '{print $1}')"
          else
            echo "::error::❌ APK NAO GERADO"
            ls -la build/ || true
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: brave-adventurers-alistair-debug
          path: ${{ github.workspace }}/build/brave-adventurers-alistair-debug.apk
          if-no-files-found: error
          retention-days: 14
