name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools + NDK
        run: |
          sdkmanager "build-tools;34.0.0" "platforms;android-34" "ndk;23.2.8568313"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libasound2 libpulse0 libgl1-mesa-dri libgles2-mesa \
            libx11-6 libxcursor1 libxinerama1 libxrandr2 libxrender1 libxi6 libdbus-1-3 xvfb \
            2>/dev/null || true

      - name: Gerar debug.keystore
        run: |
          mkdir -p "$HOME/.android"
          keytool -genkeypair \
            -keystore "$HOME/.android/debug.keystore" \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" 2>&1 | tail -2
          echo "KEYSTORE_PATH=$HOME/.android/debug.keystore" >> $GITHUB_ENV

      - name: Configurar Godot editor settings
        run: |
          mkdir -p "$HOME/.config/godot"
          cat > "$HOME/.config/godot/editor_settings-4.tres" << EOF
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/android_sdk_path = "$ANDROID_SDK_ROOT"
          export/android/debug_keystore = "$HOME/.android/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      - name: Injetar keystore path no export_presets.cfg
        working-directory: ${{ github.workspace }}
        run: |
          # Substituir placeholder do keystore com o path real do CI
          sed -i "s|keystore/debug=\".*\"|keystore/debug=\"$KEYSTORE_PATH\"|g" export_presets.cfg || true
          # Se não tinha keystore no cfg, adicionar na seção options
          if ! grep -q "keystore/debug" export_presets.cfg; then
            sed -i '/\[preset.0.options\]/a keystore/debug="'"$KEYSTORE_PATH"'"\nkeystore/debug_user="androiddebugkey"\nkeystore/debug_password="android"' export_presets.cfg
          fi
          echo "export_presets.cfg (keystore section):"
          grep -i keystore export_presets.cfg || echo "(sem keystore)"

      - name: Install Godot 4.3 + templates
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip" -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot_bin
          chmod +x /tmp/godot_bin/Godot_v4.3-stable_linux.x86_64
          sudo ln -sf /tmp/godot_bin/Godot_v4.3-stable_linux.x86_64 /usr/local/bin/godot
          TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/4.3.stable"
          mkdir -p "$TEMPLATES_DIR"
          wget -q "https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz" -O /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/tpl
          mv /tmp/tpl/templates/* "$TEMPLATES_DIR/"
          echo "Templates android: $(ls $TEMPLATES_DIR | grep android)"

      - name: Importar assets do projeto
        working-directory: ${{ github.workspace }}
        run: |
          Xvfb :99 -screen 0 1024x768x24 &
          export DISPLAY=:99
          godot --headless --path "$GITHUB_WORKSPACE" --import 2>&1 | tail -3 || true

      - name: Export APK debug
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p "$GITHUB_WORKSPACE/build"
          Xvfb :99 -screen 0 1024x768x24 &
          export DISPLAY=:99
          APK_OUT="$GITHUB_WORKSPACE/build/brave-adventurers-alistair-debug.apk"
          GODOT_OUT=$(godot --headless --verbose \
            --path "$GITHUB_WORKSPACE" \
            --export-debug "Android" \
            "$APK_OUT" 2>&1 || true)
          echo "$GODOT_OUT" | while IFS= read -r line; do
            echo "::warning::$line"
          done
          if [ -f "$APK_OUT" ]; then
            echo "::notice::APK GERADO: $(ls -lh $APK_OUT | awk '{print $5}')"
          else
            echo "::error::APK NAO GERADO — build/ vazia"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: brave-adventurers-alistair-debug
          path: ${{ github.workspace }}/build/brave-adventurers-alistair-debug.apk
          if-no-files-found: error
          retention-days: 14
