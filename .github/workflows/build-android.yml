name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools + NDK
        run: |
          sdkmanager "build-tools;34.0.0" "platforms;android-34" "ndk;23.2.8568313"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      - name: Instalar dependências do sistema para Godot headless
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libasound2 libpulse0 libgl1-mesa-dri libgles2-mesa \
            libx11-6 libxcursor1 libxinerama1 libxrandr2 libxrender1 libxi6 libdbus-1-3 xvfb \
            2>/dev/null || true

      - name: Gerar debug.keystore
        run: |
          mkdir -p "$HOME/.android"
          keytool -genkeypair \
            -keystore "$HOME/.android/debug.keystore" \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" 2>&1 | tail -2

      - name: Configurar Godot editor settings
        run: |
          mkdir -p "$HOME/.config/godot"
          cat > "$HOME/.config/godot/editor_settings-4.tres" << EOF
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/android_sdk_path = "$ANDROID_SDK_ROOT"
          export/android/debug_keystore = "$HOME/.android/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      - name: Install Godot 4.3 + templates
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip" -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot_bin
          chmod +x /tmp/godot_bin/Godot_v4.3-stable_linux.x86_64
          sudo ln -sf /tmp/godot_bin/Godot_v4.3-stable_linux.x86_64 /usr/local/bin/godot
          TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/4.3.stable"
          mkdir -p "$TEMPLATES_DIR"
          wget -q "https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz" -O /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/tpl
          mv /tmp/tpl/templates/* "$TEMPLATES_DIR/"
          mkdir -p android/build
          unzip -q "$TEMPLATES_DIR/android_source.zip" -d android/build
          echo "4.3.stable" > android/.build_version
          echo "Templates Android: $(ls $TEMPLATES_DIR | grep android)"

      - name: Pre-heat projeto
        run: |
          Xvfb :99 -screen 0 1024x768x24 &
          export DISPLAY=:99
          godot --headless --path "$(pwd)" --editor --quit 2>&1 || true
          echo "Cache: $(ls .godot/ 2>/dev/null | wc -l) itens"

      - name: Export APK debug
        run: |
          mkdir -p build logs
          Xvfb :99 -screen 0 1024x768x24 &
          export DISPLAY=:99
          # Salvar log em arquivo E mostrar no console
          godot --headless --verbose \
            --path "$(pwd)" \
            --export-debug "Android" \
            "$(pwd)/build/brave-adventurers-alistair-debug.apk" \
            > logs/godot_stdout.txt 2> logs/godot_stderr.txt
          EXIT=$?
          echo "=== STDOUT ==="
          cat logs/godot_stdout.txt
          echo "=== STDERR ==="
          cat logs/godot_stderr.txt
          echo "=== Exit: $EXIT ==="
          ls -lah build/
          exit $EXIT

      - name: Upload APK (sucesso)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: brave-adventurers-alistair-debug
          path: build/brave-adventurers-alistair-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload logs (sempre)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: godot-logs
          path: logs/
          if-no-files-found: ignore
          retention-days: 3
